<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mall Marina en CicloRecreoVía</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;
    --border:rgba(255,255,255,0.07);--accent:#00d4aa;
    --accent2:#f97316;--accent3:#f59e0b;--text:#f1f5f9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding:28px 20px;text-align:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .container{max-width:680px;margin:0 auto;position:relative;z-index:1;}
  .logo-dot-wrap{display:flex;justify-content:center;margin-bottom:10px;}
  .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 8px var(--accent);opacity:1}50%{box-shadow:0 0 22px var(--accent);opacity:0.7}}
  .title-main{font-size:48px;font-weight:800;letter-spacing:1px;color:#fff;line-height:1.1;margin-bottom:4px;}
  .title-sub{font-size:22px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:4px;}
  .title-sub span{color:var(--accent);font-weight:800;}
  .subtitle{font-size:13px;color:rgba(255,255,255,0.55);margin-top:4px;}
  .refresh-badge{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;color:rgba(255,255,255,0.55);margin-top:10px;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.5s ease-in-out infinite;}
  #last-update{font-size:11px;color:rgba(255,255,255,0.4);margin-top:6px;}
  #fecha-actual{font-size:26px;font-weight:700;color:#f97316;margin:14px 0;text-transform:capitalize;}
  #error-banner{display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 18px;margin-bottom:20px;font-size:13px;color:#fca5a5;}
  .kpi-single{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 20px;margin-bottom:18px;position:relative;overflow:hidden;}
  .kpi-single::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .kpi-single .kpi-label{font-size:18px;font-weight:800;text-transform:uppercase;color:#fff;margin-bottom:12px;letter-spacing:0.4px;}
  .kpi-single .kpi-value{font-size:80px;font-weight:800;line-height:1;color:var(--accent);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:18px;}
  .card-title{font-size:18px;font-weight:800;text-transform:uppercase;color:#fff;margin-bottom:18px;letter-spacing:0.4px;}
  .bar-list{display:flex;flex-direction:column;gap:10px;}
  .bar-item{display:flex;flex-direction:column;gap:4px;text-align:left;}
  .bar-label{font-size:13px;font-weight:700;color:#fff;display:flex;justify-content:space-between;}
  .bar-label span{color:rgba(255,255,255,0.55);font-weight:400;}
  .bar-track{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;transition:width 0.6s ease;}
  .donut-container{display:flex;flex-direction:column;align-items:center;gap:28px;}
  .donut-svg-wrap{width:100%;display:flex;justify-content:center;}
  .donut-legend{display:flex;flex-direction:column;gap:14px;align-items:flex-start;width:100%;padding:0 8px;}
  .legend-item{display:flex;align-items:center;gap:12px;}
  .legend-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;}
  .legend-label{font-size:18px;font-weight:700;color:#fff;}
  .legend-val{font-size:18px;font-weight:600;color:#fff;margin-left:4px;}
  .legend-pct{font-size:16px;color:rgba(255,255,255,0.55);margin-left:4px;}
  .timeline-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;}
  .timeline-list::-webkit-scrollbar{width:4px}
  .timeline-list::-webkit-scrollbar-track{background:var(--surface2)}
  .timeline-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
  .tl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;font-size:13px;text-align:left;}
  .tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:3px;}
  .tl-name{font-weight:700;color:#fff;min-width:70px;}
  .tl-text{color:rgba(255,255,255,0.8);flex:1;line-height:1.4;}
  footer{margin-top:24px;font-size:11px;color:rgba(255,255,255,0.35);}
  .skeleton{display:inline-block;background:linear-gradient(90deg,var(--surface2) 25%,var(--surface) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:64px;width:120px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .tab-row{display:flex;gap:8px;margin-bottom:16px;justify-content:center;flex-wrap:wrap;}
  .tab-btn{background:var(--surface2);border:1px solid var(--border);color:rgba(255,255,255,0.6);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px;cursor:pointer;}
  .tab-btn.active{background:var(--accent);border-color:var(--accent);color:#0a0e1a;}
  .no-data{color:rgba(255,255,255,0.35);font-size:13px;padding:12px 0;}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-dot-wrap"><div class="logo-dot"></div></div>
    <h1 class="title-main">MALL MARINA</h1>
    <h2 class="title-sub">en <span>CicloRecreoVía</span></h2>
    <div class="subtitle">Dashboard de registros en tiempo real</div>
    <div class="refresh-badge"><div class="live-dot"></div><span>Auto-refresh 30s</span></div>
    <div id="last-update">Cargando...</div>
  </header>

  <div id="error-banner"></div>
  <div id="fecha-actual"></div>

  <!-- TOTAL -->
  <div class="kpi-single">
    <div class="kpi-label">Total de registros</div>
    <div class="kpi-value" id="kpi-total"><div class="skeleton"></div></div>
  </div>

  <!-- COL G: SERVICIOS (donut) -->
  <div class="card">
    <div class="card-title">Servicios utilizados</div>
    <div class="donut-container">
      <div class="donut-svg-wrap">
        <svg id="donut-svg" viewBox="0 0 300 300" style="width:100%;max-width:360px;height:auto"></svg>
      </div>
      <div class="donut-legend" id="donut-legend"></div>
    </div>
  </div>

  <!-- COL H -->
  <div class="card">
    <div class="card-title">¿En qué es mejor Mall Marina?</div>
    <div class="bar-list" id="bars-h"></div>
  </div>

  <!-- COL I -->
  <div class="card">
    <div class="card-title">Mayor aporte de Mall Marina en CicloRecreoVía</div>
    <div class="bar-list" id="bars-i"></div>
  </div>

  <!-- COL J: tabs para otros eventos vs solo CRV -->
  <div class="card">
    <div class="card-title">Participa en otros eventos deportivos</div>
    <div class="bar-list" id="bars-j"></div>
  </div>

  <!-- ULTIMOS COMENTARIOS COL K -->
  <div class="card">
    <div class="card-title">Últimos comentarios</div>
    <div class="timeline-list" id="timeline-comments"></div>
  </div>

  <div style="display:flex;justify-content:center;gap:24px;margin:24px 0 8px;">
    <a href="https://docs.google.com/spreadsheets/d/1qV1LWn3fyfSOxRojvRJsWAwy4_QB-FXb6B_jT0YWaak/edit?resourcekey=&gid=802907203#gid=802907203"
       target="_blank"
       style="display:inline-block;background:var(--surface2);border:1px solid var(--border);color:#fff;font-family:Nunito,sans-serif;font-size:18px;font-weight:800;padding:14px 32px;border-radius:12px;text-decoration:none;">
      BBDD
    </a>
  </div>

  <footer id="footer-info">Cargando...</footer>
</div>

<script>
var CSV_URL = "https://docs.google.com/spreadsheets/d/1qV1LWn3fyfSOxRojvRJsWAwy4_QB-FXb6B_jT0YWaak/gviz/tq?tqx=out:csv&gid=802907203";
var REFRESH_MS = 30000;
var COLORS = ["#00d4aa","#f97316","#eab308","#a3e635","#a78bfa","#f43f5e","#e879f9","#38bdf8","#fb923c","#4ade80"];

function parseSheetDate(s){
  if(!s) return null;
  s=s.trim();
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
  if(m) return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]||0),parseInt(m[5]||0),parseInt(m[6]||0));
  var d=new Date(s); return isNaN(d.getTime())?null:d;
}

function splitLine(line){
  var cols=[],cur="",inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(ch==='"'){inQ=!inQ;continue;}
    if(ch===','&&!inQ){cols.push(cur.trim());cur="";continue;}
    cur+=ch;
  }
  cols.push(cur.trim());
  return cols;
}

function parseCSV(text){
  var lines=text.trim().split('\n'),rows=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line) continue;
    var cols=splitLine(line);
    if(cols.length<2||!cols[0]) continue;
    rows.push(cols);
  }
  return rows;
}

function countMap(rows, colIdx, multi){
  // multi: split by semicolon or comma
  var map={};
  for(var i=0;i<rows.length;i++){
    var val=(rows[i][colIdx]||'').trim();
    if(!val) continue;
    var parts = multi ? val.split(/[;,]/).map(function(s){return s.trim();}).filter(Boolean) : [val];
    for(var j=0;j<parts.length;j++){
      var k=parts[j];
      if(k) map[k]=(map[k]||0)+1;
    }
  }
  return map;
}

function sortedEntries(map){
  return Object.entries(map).sort(function(a,b){return b[1]-a[1];});
}

function drawDonut(entries,total){
  var cx=150,cy=150,r=120,innerR=72,gap=1.5;
  var svg=[];
  svg.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#1a2235" stroke-width="'+(r-innerR)+'"/>');
  svg.push('<text x="'+cx+'" y="'+(cy-8)+'" text-anchor="middle" fill="#f1f5f9" font-size="56" font-weight="800" font-family="Nunito,sans-serif">'+total+'</text>');
  svg.push('<text x="'+cx+'" y="'+(cy+24)+'" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="18" font-family="Nunito,sans-serif">TOTAL</text>');
  var legend=[],angle=-90,totalMentions=0;
  for(var i=0;i<entries.length;i++) totalMentions+=entries[i][1];
  for(var i=0;i<entries.length;i++){
    var pct=entries[i][1]/totalMentions;
    var sweep=pct*360-gap;
    if(sweep<1) sweep=1;
    var color=COLORS[i%COLORS.length];
    var s=angle*Math.PI/180,e=(angle+sweep)*Math.PI/180;
    var x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s);
    var x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
    var xi1=cx+innerR*Math.cos(e),yi1=cy+innerR*Math.sin(e);
    var xi2=cx+innerR*Math.cos(s),yi2=cy+innerR*Math.sin(s);
    var la=sweep>180?1:0;
    var d='M '+x1+' '+y1+' A '+r+' '+r+' 0 '+la+' 1 '+x2+' '+y2+' L '+xi1+' '+yi1+' A '+innerR+' '+innerR+' 0 '+la+' 0 '+xi2+' '+yi2+' Z';
    svg.push('<path d="'+d+'" fill="'+color+'" opacity="0.95"/>');
    angle+=sweep+gap;
    var label=entries[i][0];
    if(label.length>30) label=label.substring(0,28)+'…';
    legend.push('<div class="legend-item"><div class="legend-dot" style="background:'+color+'"></div><span class="legend-label">'+label+'</span><span class="legend-val">'+entries[i][1]+'</span><span class="legend-pct">('+Math.round(pct*100)+'%)</span></div>');
  }
  document.getElementById('donut-svg').innerHTML=svg.join('');
  document.getElementById('donut-legend').innerHTML=legend.join('');
}

function drawBars(containerId, entries, colorStart){
  var el=document.getElementById(containerId);
  if(!entries||entries.length===0){el.innerHTML='<div class="no-data">Sin datos aún</div>';return;}
  var max=entries[0][1];
  var html='';
  for(var i=0;i<entries.length;i++){
    var pct=max>0?Math.round((entries[i][1]/max)*100):0;
    var color=COLORS[(i+(colorStart||0))%COLORS.length];
    var label=entries[i][0];
    if(label.length>55) label=label.substring(0,53)+'…';
    html+='<div class="bar-item">'+
      '<div class="bar-label">'+label+' <span>'+entries[i][1]+'</span></div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'+
    '</div>';
  }
  el.innerHTML=html;
}

function buildComments(rows){
  var items=[];
  for(var i=rows.length-1;i>=0&&items.length<15;i--){
    var txt=(rows[i][10]||'').trim();
    if(!txt||txt==='-') continue;
    var name=(rows[i][1]||'').trim().split(' ')[0]||'—';
    var d=parseSheetDate(rows[i][0]);
    var time=d?d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'}):' ';
    items.push('<div class="tl-item"><div class="tl-dot"></div><div class="tl-name">'+name+'<br><span style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:400">'+time+'</span></div><div class="tl-text">'+txt+'</div></div>');
  }
  var el=document.getElementById('timeline-comments');
  el.innerHTML=items.length?items.join(''):'<div class="no-data">Sin comentarios aún</div>';
}

function fechaHoy(){
  var d=new Date();
  var dias=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  var meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  return dias[d.getDay()]+' '+d.getDate()+' de '+meses[d.getMonth()]+' '+d.getFullYear();
}

async function fetchData(){
  try{
    var res=await fetch(CSV_URL+'&nocache='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    var text=await res.text();
    var rows=parseCSV(text);
    if(!rows||rows.length===0) throw new Error('Sin filas');
    document.getElementById('error-banner').style.display='none';
    return rows;
  }catch(e){
    var eb=document.getElementById('error-banner');
    eb.style.display='block';
    eb.textContent='Error al cargar datos: '+e.message+'. Reintentando...';
    return null;
  }
}

function renderDashboard(rows){
  var total=rows.length;
  document.getElementById('kpi-total').textContent=total;
  document.getElementById('fecha-actual').textContent=fechaHoy();

  // Col G (idx 6): servicios — multiselect
  var gMap=countMap(rows,6,true);
  var gEntries=sortedEntries(gMap);
  drawDonut(gEntries, total);

  // Col H (idx 7): mejor en qué
  var hEntries=sortedEntries(countMap(rows,7,false));
  drawBars('bars-h', hEntries, 1);

  // Col I (idx 8): aporte en CRV
  var iEntries=sortedEntries(countMap(rows,8,false));
  drawBars('bars-i', iEntries, 3);

  // Col J (idx 9): otros eventos
  var jEntries=sortedEntries(countMap(rows,9,false));
  drawBars('bars-j', jEntries, 5);

  // Col K (idx 10): comentarios
  buildComments(rows);

  var now=new Date();
  var nowStr=now.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('last-update').textContent='Actualizado '+nowStr;
  document.getElementById('footer-info').textContent=total+' registros — '+now.toLocaleDateString('es-CL');
}

document.getElementById('fecha-actual').textContent=fechaHoy();

async function refresh(){
  var rows=await fetchData();
  if(rows&&rows.length>0) renderDashboard(rows);
}

refresh();
setInterval(refresh,REFRESH_MS);
</script>
</body>
</html>
